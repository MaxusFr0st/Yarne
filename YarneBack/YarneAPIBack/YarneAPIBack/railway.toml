# Railway service: Backend API
# In Railway UI set Root Directory to: YarneBack/YarneAPIBack/YarneAPIBack

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"

# Persistent uploads: in Railway UI → API service → Volumes → mount path:
# /app/wwwroot/uploads
