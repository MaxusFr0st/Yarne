# Railway service: Frontend (Vite static + serve)
# In Railway UI set Root Directory to: YarneFront
# Build arg VITE_API_URL must be set in Railway variables (see RAILWAY_DEPLOY.md)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
